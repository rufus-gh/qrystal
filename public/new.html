<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create a QR</title>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>

<body>
    <input type="text" class="name" placeholder="Name of the qr">
    <input type="text" class="url" placeholder="url">
    <button onclick="createQR()">Create</button>
    <div id="qr"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const client = supabase.createClient('https://vbbohspjmelnrugjyzjo.supabase.co', 'sb_publishable_MRY-JibVCsj7lZpbWIlRrQ_b4RLHb0i');

        const generateId = () => Math.random().toString(36).substring(2, 10);

        let session = null

        client.auth.getSession().then(({ data: { session: s } }) => {
            if (!s) { window.location.href = '/login.html'; return }
            session = s
        });

        _name = document.querySelector('.name');
        url = document.querySelector('.url');

        async function createQR() {
            if (!session) return
            const code = generateId()
            await client.from('redirects').insert({ name: _name.value, url: url.value, code, user_id: session.user.id })

            new QRCode(document.getElementById('qr'), {
                text: `${window.location.origin}/code/${code}`,
                width: 200,
                height: 200,
            })
        }
    </script>
</body>

</html>
